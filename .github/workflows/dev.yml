# .github/workflows/features.yml
name: Test and Integrate Features

run-name: Test the Application

on:
    push:
        branches: ["dev"]
    pull_request:
        branches: ["dev"]

jobs:
    Test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              
            - name: Set up python
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test
